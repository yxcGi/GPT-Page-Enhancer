<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GPT Page Enhancer</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <div class="header">
        <h1>内容宽度</h1>
        <output id="width-value">72%</output>
      </div>
      <input id="width-range" type="range" min="45" max="96" value="72" aria-label="ChatGPT 内容宽度百分比">
      <div class="marks">
        <span>45%</span>
        <span>96%</span>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
